apiVersion: v1
kind: Namespace
metadata:
  name: domains-exporter

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: domains-exporter
  namespace: domains-exporter

---
apiVersion: v1
kind: Service
metadata:
  name: domains-exporter
  namespace: domains-exporter
  labels:
    app: domains-exporter
spec:
  ports:
    - name: http
      port: 9222
      targetPort: 9222
      protocol: TCP
  selector:
    app: domains-exporter

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: domains-exporter
  namespace: domains-exporter
  labels:
    app: domains-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: domains-exporter
  template:
    metadata:
      labels:
        app: domains-exporter
    spec:
      serviceAccountName: domains-exporter
      containers:
        - name: domains-exporter
          image: ghcr.io/YOUR_ORG/domains-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9222
              protocol: TCP
          args:
            - --web.listen-address=:9222
            - --cache-ttl=3h
            - --whois-timeout=10s
            - --log-level=info
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsReadOnlyRootFilesystem: true

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: domains-exporter
  namespace: domains-exporter
  labels:
    app: domains-exporter
spec:
  selector:
    matchLabels:
      app: domains-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
      scrapeTimeout: 30s
