version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - dupword
    - err113
    - errcheck
    - errorlint
    - funcorder
    - goconst
    - gocritic
    - gocyclo
    - godox
    - goheader
    - govet
    - ineffassign
    - loggercheck
    - staticcheck
    - unused
    - whitespace
  settings:
    goconst:
      ignore-tests: true
    dogsled:
      max-blank-identifiers: 3
    gocyclo:
      min-complexity: 15
    godox:
      keywords:
        - NOTE
        - OPTIMIZE
        - HACK
        - TODO
        - BUG
        - FIXME
    whitespace:
      multi-if: true
      multi-func: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
