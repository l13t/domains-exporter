name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -o dist/domains-exporter-linux-amd64   .
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -o dist/domains-exporter-linux-arm64   .
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -o dist/domains-exporter-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -o dist/domains-exporter-darwin-arm64  .

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_URL || 'ghcr.io' }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL || 'ghcr.io' }}/${{ github.repository_owner }}/domains-exporter:latest
            ${{ secrets.REGISTRY_URL || 'ghcr.io' }}/${{ github.repository_owner }}/domains-exporter:${{ needs.release.outputs.new_release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
